<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inputs</title>
</head>
<body>

    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required autofocus>
    <br><br>

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email" placeholder="Digite seu E-mail" required>
    <br><br>

    <label for="numero">Número:</label>
    <input type="number" id="numero" name="numero" placeholder="Digite seu número" required>
    <br><br>

    <label for="url">url:</label>
    <input type="url" id="url" name="url" placeholder="ex: http://www.google.com" required>
    <br><br>

    <label for="pesquisa">Pesquisar:</label>
    <input type="search" id="pesquisa" name="pesquisa" placeholder="Digite sua pesquisa" required>
    <br><br>

    <label for="range">range:</label>
    <input type="range" id="range" name="range" placeholder="Digite seu nome" required>
    <br><br>

    <label for="color">Cor:</label>
    <input type="color" id="color" name="color" placeholder="Escolha uma cor" required>
    <br><br>

    <label for="data">Data:</label>
    <input type="date" id="data" name="data" required>
    <br><br>

    <input type="submit" value="Enviar">
</body>
</html>
