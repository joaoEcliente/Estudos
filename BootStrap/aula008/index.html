<!doctype html>
<html lang="ptbr">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Login Modal Bootstrap</title>
  </head>  
  <body>

    <div class="container">
        <h2>Alertas</h2>

        <div class="alert alert-success alert-dissible fade show" role="alert">
            <strong>Sucesso</strong>
            <button class="btn-close" type="button" data-bs-dismiss="alert" aria-label="close"></button>
        </div>
        <div class="alert alert-danger alert-dissible fade show" role="alert">
            <strong>Falha</strong>
                    <button class="btn-close" type="button" data-bs-dismiss="alert" aria-label="close"></button>
        </div>
        <div class="alert alert-warning alert-dissible fade show" role="alert">
            <strong>Warning</strong>
                    <button class="btn-close" type="button" data-bs-dismiss="alert" aria-label="close"></button>
        </div>
        <div class="alert alert-info alert-dissible fade show" role="alert">
            <strong>Info</strong>
                    <button class="btn-close" type="button" data-bs-dismiss="alert" aria-label="close"></button>
        </div>
    </div>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
