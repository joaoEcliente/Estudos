<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
        <link rel="stylesheet" href="../bootstrap-4.1.3-dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="css/style.css">


    <title>Hello, world!</title>
  </head>
  <body>
    <div class="container">
        <div class="page-header">
            <h1>Formulários Booststrap</h1>
        </div>

        <div class="row">
            <div class="col-sm-8">
                <h3>Cadastre-se</h3>
                <form>
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" class="form-control" id="nome">
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" class="form-control" id="email">
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" class="form-control" id="senha">
                </div>

                <div class="checkbox">
                    <label>
                        <input type="checkbox"> Aceito os termos da empresa.
                    </label>
                </div>

                <div class="radio">
                    <label >
                        <input type="radio" name="opcoes"> PHP
                    </label>

                    <label >
                        <input type="radio" name="opcoes"> JavaScript
                    </label>

                </div>

                <button class="btn btn-primary">Cadastrar</button>
            </form>
            </div>

            <div class="col-sm-4">
                <form class="">
                    <div class="form-group">
                        <h3>Logar</h3>
                        <div class="group-form">
                            <label for="email_login">E-mail</label>
                            <input type="email" class="form-control" id="email_login" placeholder="Digite seu E-mail">
                        </div>
                        <div class="group-form">
                            <label for="senha_login">Senha</label>
                            <input type="password" class="form-control" id="senha_login" placeholder="Digite sua Senha">
                        </div>
                        <button class="btn btn-primary">Logar</button>
                    </div>
                </form>
            </div>

            
        </div>
    </div>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
  </body>
</html>
