<!doctype html>
<html lang="pt-br">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Login Modal Bootstrap</title>
  </head>  
  <body>

    <div class="container">
        <h3>Tooltip</h3>
        <button type="button" class="btn btn-secondary"
        data-bs-toggle="tooltip" data-bs-placement="top"
        data-bs-custom-class="custom-tooltip"
        data-bs-title="Deu certo.">Botão 1</button>

        <button type="button" class="btn btn-primary" data-bs-toggle="tooltip" data-bs-placement="right" data-bs-custom-class="custom-tooltip" data-bs-title="Certo de novo">Botão 2</button>

        <button type="button" class="btn btn-primary" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-custom-class="custom-tooltip" data-bs-title="Mais uma vez Certo.">Botão 3</button>

        <p>Lorem ipsum dolor, sit amet <span data-bs-toggle="tooltip" data-bs-placement="top" data-bs-custom-class="custom-tooltip" data-bs-title="Passou por aqui" ><a href="#">consectetur</a></span> adipisicing elit. Sed ipsam quasi voluptatibus dolorum libero possimus, obcaecati officiis laborum quod quas.</p>
    </div>

    <div class="container">
        <h2>Popover</h2>

        <button class="btn btn-danger btn-lg" data-bs-toggle="popover" data-bs-placement="top" data-bs-title="Detalhes olá mundo!!">Detalhes</button>
    </div>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
    const tool = document.querySelectorAll('[data-bs-toggle="tooltip"]');
    
    const tooltipList = [...tool].map(
        tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl)
  );

    const tool2 = document.querySelectorAll('[data-bs-toggle="popover"]');

    const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]')
    const popoverList = [...popoverTriggerList].map(popoverTriggerEl => new bootstrap.Popover(popoverTriggerEl))
    
</script>
</html>
