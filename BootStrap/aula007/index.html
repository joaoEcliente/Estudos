<!doctype html>
<html lang="ptbr">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Login Modal Bootstrap</title>
  </head>  
  <body>

    <div class="container">
        <button type="button" class="btn btn-info" data-bs-toggle="modal" data-bs-target="#janela">Cadastre-se</button>
    </div>
    
        <form>
            <div class="modal" tabindex="-1" id="janela">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Cadastro</h5>
                            <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="close"></button>
                        </div>
                        <div class="modal-body">
                            <div class="container">
                                <div class="row">
                                    <label for="email">E-mail</label>
                                    <input type="email" placeholder="Digite seu e-mail" required>
                                </div>
            
                                <div class="row">
                                    <label for="senha">Senha</label>
                                    <input type="password" placeholder="Digite sua senha" required>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Close</button>
                            <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        const myModal = document.getElementById('janela');
        const MyInput = document.getElementById('MyInput');
        MyInput.addEventListener('shown.bs.modal', () => myInput.focus())
    </script>
</body>
</html>
