<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação</title>
</head>
<body>
    <p>Esse é um texto <strong>Negrito</strong></p><br>
    <p>Esse é um texto <em>italico</em></p><br>
    <p>Esse é um texto <u>underline</u></p><br>
    <p>Esse é um texto <strike>errado</strike></p>
    
</body>
</html>
